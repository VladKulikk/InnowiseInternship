# This special URL tells Testcontainers to start a postgres:15-alpine container
# and create a database named 'userdb'. The TC_DAEMON_OFF=true can help with cleanup.
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///userdb?TC_DAEMON_OFF=true

# This tells Spring to use the Testcontainers driver
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# We don't need username or password, as Testcontainers will handle it.